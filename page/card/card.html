<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Калькулятор</title>
</head>
<body>
    <span>Это карточка №<span class="number-card"></span></span>
    <span>Эта странница для отображения карточки товара</span>
    <button onclick="history.back()">Вернуться <i class="bi bi-house"></i></button>
</body>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        gap: 20px;
    }
    span {
        width: 50%;
        text-align: center;
    }
    button {
        text-decoration: none;
        color: #ffffff;
        font-size: 18px;
        background: #252525;
        padding: 10px 15px;
        border-radius: 10px;
        transition: .3s;
        cursor: pointer;
    }
    button:hover {
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        transition: .3s;
    }
</style>
<script>
    const params = new URLSearchParams(window.location.search);
    const cardId = params.get('id');
    document.querySelector(".number-card").textContent = cardId;
</script>
</html>
